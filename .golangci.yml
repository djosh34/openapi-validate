version: "2"

linters:
  default: fast
  disable:
    - funlen
    - gomodguard # DO NOT CHANGE THIS EVER!
    - testpackage
    - wsl
  enable:
    - errcheck
    - errorlint
    - errname
    - godoclint
    - gomodguard_v2 # DO NOT CHANGE THIS EVER!
    - govet
    - nilerr
    - nilnil
    - nolintlint
    - paralleltest
    - revive
    - staticcheck
    - wsl_v5
  settings:
    govet:
      enable:
        - shadow
    depguard:
      rules:
        main:
          files:
            - $all
          allow:
            - $gostd
            - github.com/stretchr/testify/require
            - github.com/goccy/go-yaml
            - pgregory.net/rapid
            - github.com/getkin/kin-openapi
            - github.com/djosh34/decode_and_validate_generator/pkg/peekjson
            - github.com/djosh34/decode_and_validate_generator/pkg/decode/example
            - github.com/djosh34/decode_and_validate_generator/pkg/jsonvalue
            - github.com/djosh34/decode_and_validate_generator/pkg/internal/oas
            - github.com/djosh34/decode_and_validate_generator/pkg/test_generator
            - github.com/djosh34/decode_and_validate_generator/pkg/validation
            - github.com/arran4/golang-diff/pkg/diff
            - golang.org/x/tools/imports
    errcheck:
      check-blank: true
      check-type-assertions: true
      disable-default-exclusions: true
    godoclint:
      default: basic
      enable:
        - require-doc
      options:
        require-doc:
          ignore-exported: false
          ignore-unexported: false
        start-with-name:
          include-unexported: true
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      enable-default-rules: true
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
